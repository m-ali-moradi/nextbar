<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Event Planner &mdash; All Events</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container py-4">
    <h1 class="mb-3">All Events</h1>

    <!-- Flash Messages -->
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <!-- Point “Create New” to step1 of the wizard -->
    <a class="btn btn-primary mb-3" th:href="@{/events/create/step1}">+ Create New Event</a>

    <table class="table table-bordered table-striped bg-white">
        <thead class="thead-light">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Date</th>
            <th>Location</th>
            <th>Duration (hrs)</th>
            <th>Status</th>
            <th>Beverages</th>
            <th># Bars</th>
            <th># Drop Points</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="ev : ${events}">
            <td th:text="${ev.eventId}">1</td>
            <td th:text="${ev.name}">Sample Event</td>
            <td th:text="${ev.date}">2025-06-01</td>
            <td th:text="${ev.location}">Main Hall</td>
            <td th:text="${ev.duration}">5</td>
            <td th:text="${ev.status}">PLANNED</td>

            <!-- Use the actual collection property name (here assumed `beverages`) -->
            <td th:text="${#strings.listJoin(ev.beverages.![name], ', ')}">
                Coke, Sprite, Water
            </td>

            <td th:text="${#lists.size(ev.bars)}">2</td>
            <td th:text="${#lists.size(ev.dropPoints)}">3</td>
            <td>
                <a class="btn btn-sm btn-secondary"
                   th:href="@{/events/details/{id}(id=${ev.eventId})}">
                    Details
                </a>
                <a class="btn btn-sm btn-info"
                   th:href="@{|/events/create/edit/${ev.eventId}|}">
                    Edit
                </a>
                <a class="btn btn-sm btn-danger"
                   th:href="@{|/events/delete/${ev.eventId}|}"
                   onclick="return confirm('Are you sure you want to delete this event?');">
                    Delete
                </a>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(events)}">
            <!-- colspan updated to 10 -->
            <td colspan="10" class="text-center">No events found.</td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
