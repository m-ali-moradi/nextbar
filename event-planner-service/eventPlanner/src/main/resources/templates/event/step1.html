<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title th:text="${eventForm.eventId} != null ? 'Edit Event – Step 1' : 'Create Event – Step 1'">Step 1</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css" />
</head>
<body class="bg-light">
<div class="container py-4">
    <h1 th:text="${eventForm.eventId} != null ? 'Edit Event – Step 1: Basic Details' : 'Create Event – Step 1: Basic Details'"></h1>

    <!-- Form posts to /events/create/step1 -->
    <form th:action="@{/events/create/step1}" th:object="${eventForm}" method="post">
        <!-- Event Name -->
        <div class="form-group">
            <label for="name">Event Name</label>
            <input type="text" id="name" th:field="*{name}" class="form-control" placeholder="Enter event name" />
            <div class="text-danger" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
        </div>

        <!-- Date -->
        <div class="form-group">
            <label for="date">Date</label>
            <input type="date" id="date" th:field="*{date}" class="form-control" />
            <div class="text-danger" th:if="${#fields.hasErrors('date')}" th:errors="*{date}"></div>
        </div>

        <!-- Location -->
        <div class="form-group">
            <label for="location">Location</label>
            <input type="text" id="location" th:field="*{location}" class="form-control" placeholder="Enter location" />
            <div class="text-danger" th:if="${#fields.hasErrors('location')}" th:errors="*{location}"></div>
        </div>

        <!-- Duration -->
        <div class="form-group">
            <label for="duration">Duration (hrs)</label>
            <input type="number" id="duration" th:field="*{duration}" class="form-control" placeholder="e.g. 4" min="1" />
            <div class="text-danger" th:if="${#fields.hasErrors('duration')}" th:errors="*{duration}"></div>
        </div>

        <!-- Status -->
        <div class="form-group">
            <label for="status">Status</label>
            <select id="status" th:field="*{status}" class="form-control">
                <option th:each="st : ${T(de.fhdo.eventPlanner.model.Status).values()}"
                        th:value="${st}" th:text="${st}">PLANNED</option>
            </select>
            <div class="text-danger" th:if="${#fields.hasErrors('status')}" th:errors="*{status}"></div>
        </div>

        <!-- Beverages (multi-select) -->
        <div class="form-group">
            <label for="beverages">Select Beverages (from Warehouse Catalog)</label>
            <select id="beverages" th:field="*{beverages}" multiple="multiple" class="form-control">
                <option th:each="bev : ${allBeverages}" th:value="${bev}"
                        th:text="${bev.name + ' ($' + bev.price + ')'}">Coke ($2.50)</option>
            </select>
            <small class="form-text text-muted">Hold Ctrl (Cmd) to select multiple.</small>
            <div class="text-danger" th:if="${#fields.hasErrors('beverages')}" th:errors="*{beverages}"></div>
        </div>

        <!-- Next (to Step 2) -->
        <div class="text-right">
            <button type="submit" class="btn btn-primary btn-lg">Next → Step 2</button>
        </div>
    </form>
</div>
</body>
</html>
