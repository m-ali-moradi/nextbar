<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <title th:text="${eventForm.eventId} != null ? 'Edit Event – Step 3: Drop Points' : 'Create Event – Step 3: Drop Points'"></title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css" />
  <script th:src="@{/js/jquery-3.7.1.min.js}"></script>
</head>
<body class="bg-light">
<div class="container py-4">
  <h1 th:text="${eventForm.eventId} != null ? 'Edit Event – Step 3: Configure Drop Points' : 'Create Event – Step 3: Configure Drop Points'"></h1>

  <form th:action="@{/events/create/step3}" th:object="${eventForm}" method="post">
    <!-- Hidden eventId again (so save logic knows if we’re editing or creating) -->
    <input type="hidden" th:field="*{eventId}" />

    <div id="dropsContainer">
      <div th:each="dp, dpStat : *{dropPoints}" class="border rounded p-3 mb-3">
        <h5>
          Drop Point <span th:text="${dpStat.index + 1}">1</span>
          <button type="button" class="btn btn-sm btn-danger float-right removeDropBtn">&times; Remove</button>
        </h5>

        <input type="hidden" th:field="*{dropPoints[__${dpStat.index}__].dropPointId}" />

        <div class="form-row">
          <div class="form-group col-md-6">
            <label th:for="${'dropPoints[' + dpStat.index + '].location'}">Location</label>
            <input type="text"
                   th:field="*{dropPoints[__${dpStat.index}__].location}"
                   class="form-control"
                   placeholder="e.g. South Entrance" />
            <div class="text-danger"
                 th:if="${#fields.hasErrors('dropPoints[' + dpStat.index + '].location')}"
                 th:errors="*{dropPoints[__${dpStat.index}__].location}"></div>
          </div>
          <div class="form-group col-md-6">
            <label th:for="${'dropPoints[' + dpStat.index + '].capacity'}">Capacity</label>
            <input type="number"
                   th:field="*{dropPoints[__${dpStat.index}__].capacity}"
                   class="form-control"
                   placeholder="e.g. 200" min="1" />
            <div class="text-danger"
                 th:if="${#fields.hasErrors('dropPoints[' + dpStat.index + '].capacity')}"
                 th:errors="*{dropPoints[__${dpStat.index}__].capacity}"></div>
          </div>
        </div>
      </div> <!-- end each drop point -->

      <div th:if="${#fields.hasErrors('dropPoints')}" class="text-danger mb-2"
           th:errors="*{dropPoints}">You must configure at least one drop point</div>
    </div> <!-- end #dropsContainer -->

    <button type="button" class="btn btn-secondary mb-3" id="addDropBtn">+ Add Drop Point</button>

    <!-- Navigation: “Back to Step 2” + Final “Save Event” -->
    <div class="d-flex justify-content-between">
      <a th:href="@{/events/create/step2}" class="btn btn-outline-primary">← Back to Step 2</a>
      <button type="submit" class="btn btn-success">Save Event</button>
    </div>
  </form>
</div>

<!-- Hidden template for a brand-new Drop Point panel -->
<script type="text/template" id="drop-template">
  <div class="border rounded p-3 mb-3">
    <h5>
      Drop Point __DP_NUMBER__
      <button type="button" class="btn btn-sm btn-danger float-right removeDropBtn">&times; Remove</button>
    </h5>
    <input type="hidden" name="dropPoints[__INDEX__].dropPointId" value="" />

    <div class="form-row">
      <div class="form-group col-md-6">
        <label>Location</label>
        <input type="text" name="dropPoints[__INDEX__].location" class="form-control" placeholder="e.g. South Entrance" />
      </div>
      <div class="form-group col-md-6">
        <label>Capacity</label>
        <input type="number" name="dropPoints[__INDEX__].capacity" class="form-control" placeholder="e.g. 200" min="1" />
      </div>
    </div>
  </div>
</script>

<!-- jQuery to handle “+ Add Drop Point” and “× Remove” -->
<script th:inline="javascript">
  /*<![CDATA[*/
  $(document).ready(function() {
    let dropCount = /*[[${#lists.size(eventForm.dropPoints)}]]*/ 0;

    $('#addDropBtn').on('click', function() {
      let dropHtml = $('#drop-template').html();
      dropHtml = dropHtml.replace(/__INDEX__/g, dropCount);
      dropHtml = dropHtml.replace(/__DP_NUMBER__/g, dropCount + 1);
      $('#dropsContainer').append(dropHtml);
      dropCount++;
    });

    $('#dropsContainer').on('click', '.removeDropBtn', function() {
      $(this).closest('.border').remove();
    });
  });
  /*]]>*/
</script>
</body>
</html>
