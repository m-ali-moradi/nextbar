<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <title th:text="${eventForm.eventId} != null ? 'Edit Event – Step 2: Bars' : 'Create Event – Step 2: Bars'"></title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css" />
  <script th:src="@{/js/jquery-3.7.1.min.js}"></script>
</head>
<body class="bg-light">
<div class="container py-4">
  <h1 th:text="${eventForm.eventId} != null ? 'Edit Event – Step 2: Configure Bars' : 'Create Event – Step 2: Configure Bars'"></h1>

  <form th:action="@{/events/create/step2}" th:object="${eventForm}" method="post">
    <!-- Hidden eventId (so that on final save we know if this is an update vs. new) -->
    <input type="hidden" th:field="*{eventId}" />

    <div id="barsContainer">
      <!-- Render existing BarPlanForm entries (populated either by constructor or by Step 1) -->
      <div th:each="bar, barStat : *{bars}" class="border rounded p-3 mb-3">
        <h5>
          Bar <span th:text="${barStat.index + 1}">1</span>
          <button type="button" class="btn btn-sm btn-danger float-right removeBarBtn">&times; Remove</button>
        </h5>

        <!-- barId hidden (if editing an existing bar) -->
        <input type="hidden" th:field="*{bars[__${barStat.index}__].barId}" />

        <div class="form-row">
          <div class="form-group col-md-4">
            <label th:for="${'bars[' + barStat.index + '].barName'}">Bar Name</label>
            <input type="text"
                   th:field="*{bars[__${barStat.index}__].barName}"
                   class="form-control"
                   placeholder="e.g. Main Bar" />
            <div class="text-danger"
                 th:if="${#fields.hasErrors('bars[' + barStat.index + '].barName')}"
                 th:errors="*{bars[__${barStat.index}__].barName}"></div>
          </div>

          <div class="form-group col-md-4">
            <label th:for="${'bars[' + barStat.index + '].location'}">Location</label>
            <input type="text"
                   th:field="*{bars[__${barStat.index}__].location}"
                   class="form-control"
                   placeholder="e.g. North Corner" />
            <div class="text-danger"
                 th:if="${#fields.hasErrors('bars[' + barStat.index + '].location')}"
                 th:errors="*{bars[__${barStat.index}__].location}"></div>
          </div>

          <div class="form-group col-md-4">
            <label th:for="${'bars[' + barStat.index + '].totalCapacity'}">Total Capacity</label>
            <input type="number"
                   th:field="*{bars[__${barStat.index}__].totalCapacity}"
                   class="form-control"
                   placeholder="e.g. 500" min="1" />
            <div class="text-danger"
                 th:if="${#fields.hasErrors('bars[' + barStat.index + '].totalCapacity')}"
                 th:errors="*{bars[__${barStat.index}__].totalCapacity}"></div>
          </div>
        </div>

        <!-- Assign beverage quantities for each beverage type -->
        <div class="form-group">
          <label>Assign beverage quantities (Sum must be ≤ Total Capacity)</label>
          <div class="form-row">
            <div th:each="bev, bevStat : ${allBeverages}" class="col-md-3 mb-2">
              <div class="input-group">
                <div class="input-group-prepend">
                  <div class="input-group-text">
                    <input type="checkbox"
                           id="bevChk__${barStat.index}__${bevStat.index}"
                           name="bars[__${barStat.index}__].beverageStock['${bev.name}']"
                           th:checked="${bar.beverageStock.containsKey(bev.name)}"
                           value="0" />
                  </div>
                </div>
                <input type="number"
                       class="form-control"
                       min="0"
                       placeholder="Qty for [[${bev.name}]]"
                       th:enabled="${bar.beverageStock.containsKey(bev.name)}"
                       th:value="${bar.beverageStock.getOrDefault(bev.name, 0)}"
                       th:field="*{bars[__${barStat.index}__].beverageStock['${bev.name}']}" />
                <div class="input-group-append">
                  <span class="input-group-text" th:text="${bev.name}">Coke</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div> <!-- end each bar -->

      <!-- If the user tried to submit Step2 with zero bars, show error -->
      <div th:if="${#fields.hasErrors('bars')}" class="text-danger mb-2"
           th:errors="*{bars}">You must configure at least one bar</div>
    </div> <!-- end #barsContainer -->

    <!-- Button to clone a “hidden template” bar panel -->
    <button type="button" class="btn btn-secondary mb-3" id="addBarBtn">+ Add Bar</button>

    <!-- Navigation: “Back to Step 1” and “Next → Step 3” -->
    <div class="d-flex justify-content-between">
      <a th:href="@{/events/create/step1}" class="btn btn-outline-primary">← Back to Step 1</a>
      <button type="submit" class="btn btn-primary">Next → Step 3</button>
    </div>
  </form>
</div>

<!-- Hidden “bar‐template” for JS to clone. Note the __INDEX__ and __BAR_NUMBER__ placeholders. -->
<script type="text/template" id="bar-template">
  <div class="border rounded p-3 mb-3">
    <h5>
      Bar __BAR_NUMBER__
      <button type="button" class="btn btn-sm btn-danger float-right removeBarBtn">&times; Remove</button>
    </h5>
    <input type="hidden" name="bars[__INDEX__].barId" value="" />
    <div class="form-row">
      <div class="form-group col-md-4">
        <label>Bar Name</label>
        <input type="text" name="bars[__INDEX__].barName" class="form-control" placeholder="e.g. Main Bar" />
      </div>
      <div class="form-group col-md-4">
        <label>Location</label>
        <input type="text" name="bars[__INDEX__].location" class="form-control" placeholder="e.g. North Corner" />
      </div>
      <div class="form-group col-md-4">
        <label>Total Capacity</label>
        <input type="number" name="bars[__INDEX__].totalCapacity" class="form-control" placeholder="e.g. 500" min="1" />
      </div>
    </div>

    <!-- beverageStock rows (Thymeleaf loop will run server-side) -->
    <div class="form-group">
      <label>Assign beverage quantities (Sum must be ≤ Total Capacity)</label>
      <div class="form-row">
        <div th:each="bev, bevStat : ${allBeverages}" class="col-md-3 mb-2">
          <div class="input-group">
            <div class="input-group-prepend">
              <div class="input-group-text">
                <input type="checkbox"
                       id="bevChk____INDEX____${bevStat.index}"
                       name="bars[__INDEX__].beverageStock['${bev.name}']"
                       value="0" />
              </div>
            </div>
            <input type="number"
                   class="form-control"
                   min="0"
                   placeholder="Qty for [[${bev.name}]]"
                   name="bars[__INDEX__].beverageStock['${bev.name}']" />
            <div class="input-group-append">
              <span class="input-group-text" th:text="${bev.name}">Coke</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</script>

<!-- jQuery for “+ Add Bar” and “× Remove” -->
<script th:inline="javascript">
  /*<![CDATA[*/
  $(document).ready(function() {
    // barCount starts at however many bars were rendered from the server:
    let barCount = /*[[${#lists.size(eventForm.bars)}]]*/ 0;

    // Add a new Bar panel
    $('#addBarBtn').on('click', function() {
      let barHtml = $('#bar-template').html();
      // Replace __INDEX__ with the zero-based index, and __BAR_NUMBER__ with (index+1)
      barHtml = barHtml.replace(/__INDEX__/g, barCount);
      barHtml = barHtml.replace(/__BAR_NUMBER__/g, barCount + 1);
      $('#barsContainer').append(barHtml);
      barCount++;
    });

    // Delegate removeBarBtn
    $('#barsContainer').on('click', '.removeBarBtn', function() {
      $(this).closest('.border').remove();
    });
  });
  /*]]>*/
</script>
</body>
</html>
