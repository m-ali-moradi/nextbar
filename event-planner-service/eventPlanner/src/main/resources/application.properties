spring.application.name=eventPlanner

# -------------------------------------------------------------------
# H2 Database (in-memory) settings
# -------------------------------------------------------------------
spring.datasource.url=jdbc:h2:mem:eventdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Show SQL in console (helpful for debugging)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Automatically create/drop tables (for development only)
spring.jpa.hibernate.ddl-auto=update

# H2 Console (enabled by default)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Thymeleaf template cache = false (so you can edit templates without restarting)
spring.thymeleaf.cache=false

# Disable Eureka registration and discovery for now
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false
spring.cloud.discovery.enabled=false
