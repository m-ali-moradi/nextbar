<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title th:text="${eventForm.eventId} != null ? 'Edit Event – Step 2' : 'Create Event – Step 2'">
    Configure Bars
  </title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css"/>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"
          integrity="sha256-/xUj+3OJ+YThvYvI6rXaaYMmUTeGRc+MakNPkjp4Y2I=" crossorigin="anonymous"></script>
</head>
<body class="bg-light">
<div class="container py-4">
  <h1 th:text="${eventForm.eventId} != null ? 'Edit Event – Step 2' : 'Create Event – Step 2'">
    Configure Bars
  </h1>

  <form th:action="@{/events/create/step2}" th:object="${eventForm}" method="post">
    <!-- Carry over Step 1 data -->
    <input type="hidden" th:field="*{eventId}" />
    <input type="hidden" th:field="*{name}" />
    <input type="hidden" th:field="*{date}" />
    <input type="hidden" th:field="*{location}" />
    <input type="hidden" th:field="*{status}" />

    <!-- Hidden re-post of beverageIds -->
    <div th:each="bev, stat : ${selectedBeverages}">
      <input type="hidden" th:field="*{beverageIds[__${stat.index}__]}" />
    </div>

    <!-- Bars container -->
    <div id="barsContainer">
      <!-- Render existing bars -->
      <div th:each="bar, stat : *{bars}" class="border rounded p-3 mb-3">
        <h5>
          Bar <span th:text="${stat.index + 1}">1</span>
          <button type="button" class="btn btn-sm btn-danger float-right removeBarBtn">× Remove</button>
        </h5>
        <input type="hidden" th:field="*{bars[__${stat.index}__].barId}" />
        <div class="form-row">
          <div class="form-group col-md-4">
            <label>Bar Name</label>
            <input type="text" th:field="*{bars[__${stat.index}__].barName}" class="form-control" placeholder="e.g. Main Bar"/>
          </div>
          <div class="form-group col-md-4">
            <label>Location</label>
            <input type="text" th:field="*{bars[__${stat.index}__].location}" class="form-control" placeholder="e.g. North Corner"/>
          </div>
          <div class="form-group col-md-4">
            <label>Total Capacity</label>
            <input type="number" th:field="*{bars[__${stat.index}__].totalCapacity}" class="form-control" min="0" placeholder="e.g. 500"/>
          </div>
        </div>
        <div class="form-group">
          <label>Assign beverage quantities (Sum ≤ Total Capacity)</label>
          <div class="form-row">
            <div th:each="bev, stat2 : *{selectedBeverages}" class="input-group col-md-3 mb-2">
              <input type="number" class="form-control" min="0"
                     th:attr="name=|bars[${stat.index}].beverageStock[${bev.name}]|"
                     th:value="${bar.beverageStock[bev.name]}"
                     th:placeholder="|Qty for ${bev.name}|" />
              <div class="input-group-append">
                <span class="input-group-text" th:text="${bev.name}">Beverage</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
</div>

<!-- No bars warning -->
<div th:if="${#lists.isEmpty(eventForm.bars)}" class="alert alert-danger">
  You must configure at least one bar
</div>

<!-- Add Bar button -->
<button type="button" id="addBarBtn" class="btn btn-secondary mb-3">+ Add Bar</button>

<!-- Navigation -->
<div class="d-flex justify-content-between">
  <a th:href="@{/events/create/step1}" class="btn btn-outline-primary">← Back to Step 1</a>
  <button type="submit" class="btn btn-primary">Next → Step 3</button>
</div>
</form>

<!-- Hidden template row for cloning -->
<!-- Hidden template row for cloning -->
<div id="barTemplate" data-template="true" style="display:none;" th:inline="text">
  <div class="border rounded p-3 mb-3">
    <h5>Bar <span>0</span>
      <button type="button" class="btn btn-sm btn-danger float-right removeBarBtn">× Remove</button>
    </h5>
    <input type="hidden" name="bars[0].barId" />
    <div class="form-row">
      <div class="form-group col-md-4">
        <label>Bar Name</label>
        <input type="text" name="bars[0].barName" class="form-control" placeholder="e.g. Main Bar" />
      </div>
      <div class="form-group col-md-4">
        <label>Location</label>
        <input type="text" name="bars[0].location" class="form-control" placeholder="e.g. North Corner" />
      </div>
      <div class="form-group col-md-4">
        <label>Total Capacity</label>
        <input type="number" name="bars[0].totalCapacity" class="form-control" min="0" placeholder="e.g. 500" />
      </div>
    </div>
    <div class="form-group">
      <label>Assign beverage quantities (Sum ≤ Total Capacity)</label>
      <div class="form-row">
        <div th:each="bev : ${selectedBeverages}" class="input-group col-md-3 mb-2">
          <input type="number"
                 name="bars[0].beverageStock[[${bev.name}]]"
                 class="form-control" min="0"
                 placeholder="Qty for [[${bev.name}]]" />
          <div class="input-group-append">
            <span class="input-group-text">[[${bev.name}]]</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="form-group col-md-4">
  <label>Location</label>
  <input type="text" name="bars[0].location" class="form-control" placeholder="e.g. North Corner" />
</div>
<div class="form-group col-md=4">
  <label>Total Capacity</label>
  <input type="number" name="bars[0].totalCapacity" class="form-control" min="0" placeholder="e.g. 500" />
</div>
</div>
<div class="form-group">
  <label>Assign beverage quantities (Sum ≤ Total Capacity)</label>
  <div class="form-row">
    <div th:each="bev : ${selectedBeverages}" class="input-group col-md-3 mb-2">
      <input type="number" name="bars[0].beverageStock[${bev.name}]" class="form-control" min="0" placeholder="Qty for [[${bev.name}]]" />
      <div class="input-group-append">
        <span class="input-group-text">[[${bev.name}]]</span>
      </div>
    </div>
  </div>
</div>
</div>
</div>
</div>

<script th:inline="javascript">
  document.addEventListener('DOMContentLoaded', function() {
    const addBtn = document.getElementById('addBarBtn');
    const container = document.getElementById('barsContainer');
    const template = document.getElementById('barTemplate');
    let barCount = container.querySelectorAll('.border').length;

    addBtn.addEventListener('click', () => {
      const clone = template.cloneNode(true);
      clone.removeAttribute('id');
      clone.removeAttribute('data-template');
      clone.style.display = '';
      // update index for heading, inputs
      const idx = barCount;
      clone.querySelector('h5 span').textContent = idx + 1;
      clone.querySelectorAll('input').forEach(inp => {
        if (inp.name) {
          inp.name = inp.name.replace(/\[0\]/g, '[' + idx + ']');
        }
        if (inp.placeholder) {
          inp.placeholder = inp.placeholder.replace(/Qty for \[\[\$\{bev\.name\}\]\]/, match => match);
        }
      });
      container.appendChild(clone);
      barCount++;
    });

    container.addEventListener('click', function(e) {
      const btn = e.target.closest('.removeBarBtn');
      if (!btn) return;
      btn.closest('.border').remove();
    });
  });
</script>
</body>
</html>
