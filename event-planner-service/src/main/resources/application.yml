# Event Planner Service Configuration
spring:
  application:
    name: eventplanner-service
  
  # Import configuration from Config Server
  config:
    import: optional:configserver:http://localhost:8888
  
  # MySQL Database Configuration
  datasource:
    url: jdbc:mysql://localhost:3306/event_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  # JPA/Hibernate Configuration
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: false
    database-platform: org.hibernate.dialect.MySQLDialect
    properties:
      hibernate:
        format_sql: true
  
  sql:
    init:
      mode: never
  
  # RabbitMQ Configuration
  rabbitmq:
    host: localhost
    port: 5672
    username: nextbar
    password: nextbar123
  
  # Spring Cloud OpenFeign
  cloud:
    openfeign:
      circuitbreaker:
        enabled: true
    stream:
      bindings:
        # Output bindings for publishing events
        barCreated-out-0:
          destination: event.bar.created
          content-type: application/json
        dropPointCreated-out-0:
          destination: event.droppoint.created
          content-type: application/json
        staffAssigned-out-0:
          destination: event.staff.assigned
          content-type: application/json
        eventStarted-out-0:
          destination: event.started
          content-type: application/json
      rabbit:
        bindings:
          barCreated-out-0:
            producer:
              exchange-type: fanout
              exchange-durable: true
              delivery-mode: PERSISTENT
          dropPointCreated-out-0:
            producer:
              exchange-type: fanout
              exchange-durable: true
              delivery-mode: PERSISTENT
          staffAssigned-out-0:
            producer:
              exchange-type: topic
              exchange-durable: true
              delivery-mode: PERSISTENT
          eventStarted-out-0:
            producer:
              exchange-type: fanout
              exchange-durable: true
              delivery-mode: PERSISTENT

# Server Configuration
server:
  port: 8082

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:2YrmlATq8aGvu9r5OSwV2s3g6tZqYbhyZnMNsnU/wvO27lfYxbgm5foq7F2Vsmw1eZC4WbdKHx3IXW5J7PddEA==}

# Eureka Client Configuration
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    ip-address: 127.0.0.1
    hostname: localhost
    lease-renewal-interval-in-seconds: 30
    lease-expiration-duration-in-seconds: 90

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

# Logging Configuration
logging:
  level:
    root: INFO
    de.fhdo.eventPlanner: DEBUG
    io.github.resilience4j: DEBUG
    org.springframework.cloud.openfeign: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/eventplanner-service.log

# SpringDoc OpenAPI Configuration
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    tags-sorter: alpha
    operations-sorter: alpha
  show-actuator: true

# Resilience4j Configuration
resilience4j:
  circuitbreaker:
    instances:
      userService:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10000
        permittedNumberOfCallsInHalfOpenState: 3
      warehouseService:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10000
        permittedNumberOfCallsInHalfOpenState: 3
