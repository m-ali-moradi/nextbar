version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: nextbar-rabbitmq
    ports:
      - "5672:5672" # AMQP protocol
      - "15672:15672" # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - nextbar-network

  zipkin:
    image: openzipkin/zipkin:latest
    container_name: nextbar-zipkin
    ports:
      - "9411:9411"
    networks:
      - nextbar-network

volumes:
  rabbitmq_data:


networks:
  nextbar-network:
    driver: bridge
