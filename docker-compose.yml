# Docker Compose configuration for NextBar microservices architecture
services:
  # ── MySQL Database ──────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0.36
    container_name: nextbar-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-databases.sql:/docker-entrypoint-initdb.d/01-init-databases.sql:ro
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - nextbar-network

  # ── Centralized Configuration Server ────────────────────────────────────────
  config-server:
    build:
      context: .
      dockerfile: servers/config-server/Dockerfile
    container_name: nextbar-config-server
    ports:
      - "8888:8888"
    environment:
      SPRING_PROFILES_ACTIVE: git
      SPRING_CLOUD_CONFIG_SERVER_GIT_URI: ${CONFIG_REPO_GIT_URI:-https://github.com/m-ali-moradi/nextBar}
      SPRING_CLOUD_CONFIG_SERVER_GIT_SEARCH_PATHS: ${CONFIG_REPO_GIT_SEARCH_PATHS:-config-repo}
      SPRING_CLOUD_CONFIG_SERVER_GIT_DEFAULT_LABEL: ${CONFIG_REPO_GIT_DEFAULT_LABEL:-main}
      SPRING_CLOUD_CONFIG_SERVER_GIT_CLONE_ON_START: true
      SPRING_CLOUD_CONFIG_SERVER_GIT_FORCE_PULL: true
      SPRING_CLOUD_CONFIG_SERVER_GIT_USERNAME: ${CONFIG_REPO_GIT_USERNAME:-}
      SPRING_CLOUD_CONFIG_SERVER_GIT_TOKEN: ${CONFIG_REPO_GIT_TOKEN:-}
      LOKI_URL: http://loki:3100
      JAVA_OPTS: -Xms128m -Xmx512m
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8888/actuator/health | grep -q '\"status\":\"UP\"'" ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - nextbar-network

  # ── Eureka Service Discovery Server ─────────────────────────────────────────
  eureka-server:
    build:
      context: .
      dockerfile: servers/eureka-server/Dockerfile
    container_name: nextbar-eureka-server
    ports:
      - "8761:8761"
    environment:
      SPRING_CLOUD_CONFIG_URI: http://config-server:8888
      EUREKA_INSTANCE_HOSTNAME: eureka-server
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      LOKI_URL: http://loki:3100
      JAVA_OPTS: -Xms128m -Xmx512m
    depends_on:
      config-server:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health | grep -q '\"status\":\"UP\"'" ]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - nextbar-network

  # ── RabbitMQ Message Broker ─────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: nextbar-rabbitmq
    ports:
      - "5672:5672" # AMQP protocol
      - "15672:15672" # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - nextbar-network

  # ── Zipkin Distributed Tracing Server ───────────────────────────────────────
  zipkin:
    image: openzipkin/zipkin:3.4
    container_name: nextbar-zipkin
    ports:
      - "9411:9411"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - nextbar-network

  # ── Loki: Log aggregation ──────────────────────────────────────────────────
  loki:
    image: grafana/loki:2.9.6
    container_name: nextbar-loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - nextbar-network

  # ── Prometheus Metrics Collection ──────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: nextbar-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./config-repo/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - nextbar-network

  # ── Grafana Visualization ──────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    container_name: nextbar-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - nextbar-network
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/nextbar-dashboard.json:/var/lib/grafana/dashboards/nextbar-dashboard.json:ro

  # ── API Gateway ─────────────────────────────────────────────────────────────
  gateway:
    build:
      context: .
      dockerfile: servers/gateway/Dockerfile
    container_name: nextbar-gateway
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    environment:
      SPRING_CLOUD_CONFIG_URI: http://config-server:8888
      EUREKA_SERVER_URL: http://eureka-server:8761/eureka/
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_AMQP_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      AUTH_SERVICE_BASE_URL: http://users-service:8090
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost}
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
      ZIPKIN_BASE_URL: http://zipkin:9411
      LOKI_URL: http://loki:3100
      JAVA_OPTS: -Xms128m -Xmx512m
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"'" ]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - nextbar-network

  # ── Users Service ───────────────────────────────────────────────────────────
  users-service:
    build:
      context: .
      dockerfile: users-service/Dockerfile
    container_name: nextbar-users-service
    ports:
      - "${USERS_SERVICE_PORT:-8090}:8090"
    environment:
      SPRING_CLOUD_CONFIG_URI: http://config-server:8888
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_SERVER_URL: http://eureka-server:8761/eureka/
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD:-root}
      DB_HOST: mysql
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_AMQP_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost}
      ZIPKIN_BASE_URL: http://zipkin:9411
      JPA_DDL_AUTO: ${JPA_DDL_AUTO:-update}
      LOKI_URL: http://loki:3100
      JAVA_OPTS: -Xms128m -Xmx512m
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8090/actuator/health | grep -q '\"status\":\"UP\"'" ]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - nextbar-network

  # ── Bar Service ─────────────────────────────────────────────────────────────
  bar-service:
    build:
      context: .
      dockerfile: bar-service/Dockerfile
    container_name: nextbar-bar-service
    ports:
      - "${BAR_SERVICE_PORT:-8081}:8081"
    environment:
      SPRING_CLOUD_CONFIG_URI: http://config-server:8888
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_SERVER_URL: http://eureka-server:8761/eureka/
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD:-root}
      DB_HOST: mysql
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_AMQP_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost}
      ZIPKIN_BASE_URL: http://zipkin:9411
      JPA_DDL_AUTO: ${JPA_DDL_AUTO:-update}
      BAR_BOOTSTRAP_ENABLE_FALLBACK_DATA: ${BAR_BOOTSTRAP_ENABLE_FALLBACK_DATA:-false}
      FEATURE_EVENT_COMPLETED_ENABLED: ${FEATURE_EVENT_COMPLETED_ENABLED:-false}
      LOKI_URL: http://loki:3100
      JAVA_OPTS: -Xms128m -Xmx512m
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health | grep -q '\"status\":\"UP\"'" ]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - nextbar-network

  # ── Event Planner Service ───────────────────────────────────────────────────
  eventplanner-service:
    build:
      context: .
      dockerfile: eventPlanner-service/Dockerfile
    container_name: nextbar-eventplanner-service
    ports:
      - "${EVENT_PLANNER_SERVICE_PORT:-8082}:8082"
    environment:
      SPRING_CLOUD_CONFIG_URI: http://config-server:8888
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_SERVER_URL: http://eureka-server:8761/eureka/
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD:-root}
      DB_HOST: mysql
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_AMQP_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost}
      ZIPKIN_BASE_URL: http://zipkin:9411
      JPA_DDL_AUTO: ${JPA_DDL_AUTO:-update}
      LOKI_URL: http://loki:3100
      JAVA_OPTS: -Xms128m -Xmx512m
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8082/actuator/health | grep -q '\"status\":\"UP\"'" ]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - nextbar-network

  # ── Drop Points Service ─────────────────────────────────────────────────────
  droppoint-service:
    build:
      context: .
      dockerfile: dropPoint-service/Dockerfile
    container_name: nextbar-droppoint-service
    ports:
      - "${DROPPOINT_SERVICE_PORT:-8083}:8083"
    environment:
      SPRING_CLOUD_CONFIG_URI: http://config-server:8888
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_SERVER_URL: http://eureka-server:8761/eureka/
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD:-root}
      DB_HOST: mysql
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_AMQP_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost}
      ZIPKIN_BASE_URL: http://zipkin:9411
      JPA_DDL_AUTO: ${JPA_DDL_AUTO:-update}
      LOKI_URL: http://loki:3100
      JAVA_OPTS: -Xms128m -Xmx512m
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8083/actuator/health | grep -q '\"status\":\"UP\"'" ]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - nextbar-network

  # ── Warehouse Service ───────────────────────────────────────────────────────
  warehouse-service:
    build:
      context: .
      dockerfile: warehouse-service/Dockerfile
    container_name: nextbar-warehouse-service
    ports:
      - "${WAREHOUSE_SERVICE_PORT:-8085}:8085"
    environment:
      SPRING_CLOUD_CONFIG_URI: http://config-server:8888
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_SERVER_URL: http://eureka-server:8761/eureka/
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD:-root}
      DB_HOST: mysql
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_AMQP_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost}
      ZIPKIN_BASE_URL: http://zipkin:9411
      JPA_DDL_AUTO: ${JPA_DDL_AUTO:-update}
      SPRING_JPA_DEFER_DATASOURCE_INITIALIZATION: "true"
      LOKI_URL: http://loki:3100
      JAVA_OPTS: -Xms128m -Xmx512m
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8085/actuator/health | grep -q '\"status\":\"UP\"'" ]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - nextbar-network

  # ── Frontend (Vue 3 SPA) ────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: servers/frontend/Dockerfile
    container_name: nextbar-frontend
    ports:
      - "80:80"
    environment:
      VITE_API_BASE_URL: http://gateway:8080
    depends_on:
      gateway:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - nextbar-network

volumes:
  mysql_data:
  rabbitmq_data:
  grafana_data:


networks:
  nextbar-network:
    driver: bridge
