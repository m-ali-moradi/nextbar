# =============================================================================
# NextBar CI/CD Pipeline — Build, Test, Docker, Deploy to Local Server
# =============================================================================
#
# Triggered on:
#   - Push to main branch
#   - Pull requests targeting main
#
# Pipeline stages:
#   1. test        → Maven verify (all modules)
#   2. build-push  → Docker build + tag (optional push to registry)
#   3. deploy-local → Deploy to local server via Docker Compose
# =============================================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '22'
  IMAGE_TAG: ${{ github.sha }}

permissions:
  contents: read
  packages: write

# ─── Stage 1: Test ────────────────────────────────────────────────────────────
jobs:
  test:
    name: Build & Test (Maven)
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Run Maven verify
        run: mvn -B -f pom.xml verify

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: '**/target/surefire-reports/*.xml'
          retention-days: 7

  # ─── Frontend Tests ───────────────────────────────────────────────────────
  test-frontend:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: servers/frontend/package-lock.json

      - name: Install dependencies
        working-directory: servers/frontend
        run: npm ci

      - name: Build frontend
        working-directory: servers/frontend
        run: npm run build

  # ─── Stage 2: Docker Build ────────────────────────────────────────────────
  build-push:
    name: Docker Build
    needs: [test, test-frontend]
    runs-on: self-hosted

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: bar-service
            dockerfile: bar-service/Dockerfile
            context: .
          - service: droppoint-service
            dockerfile: dropPoint-service/Dockerfile
            context: .
          - service: eventplanner-service
            dockerfile: eventPlanner-service/Dockerfile
            context: .
          - service: users-service
            dockerfile: users-service/Dockerfile
            context: .
          - service: warehouse-service
            dockerfile: warehouse-service/Dockerfile
            context: .
          - service: config-server
            dockerfile: servers/config-server/Dockerfile
            context: .
          - service: eureka-server
            dockerfile: servers/eureka-server/Dockerfile
            context: .
          - service: gateway
            dockerfile: servers/gateway/Dockerfile
            context: .
          - service: frontend
            dockerfile: servers/frontend/Dockerfile
            context: .

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false  # optional: only build locally
          tags: ${{ matrix.service }}:${{ env.IMAGE_TAG }}

  # ─── Stage 3: Deploy to Local Server ───────────────────────────────────────
  deploy-local:
    name: Deploy to Local Server
    needs: build-push
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy with Docker Compose
        run: |
          cd /home/ali/nextbar   # path to your project on the VM
          docker compose down
          docker compose up -d --build
