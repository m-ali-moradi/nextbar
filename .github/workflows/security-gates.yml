name: Security Gates

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  frontend-security:
    name: Frontend Lint + Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: servers/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: servers/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint --if-present

      - name: Verify production source maps are disabled
        run: |
          if [ -f vite.config.ts ]; then
            grep -q "sourcemap.*false" vite.config.ts
          elif [ -f vite.config.js ]; then
            grep -q "sourcemap.*false" vite.config.js
          fi

      - name: Audit npm dependencies
        run: npm audit --audit-level=high

  java-security:
    name: Java Build + Dependency Check (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: bar-service
            pom: bar-service/pom.xml
          - service: users-service
            pom: users-service/pom.xml
          - service: eventplanner-service
            pom: eventPlanner-service/pom.xml
          - service: droppoint-service
            pom: dropPoint-service/pom.xml
          - service: warehouse-service
            pom: warehouse-service/pom.xml
          - service: gateway
            pom: servers/gateway/pom.xml
          - service: config-server
            pom: servers/config-server/pom.xml
          - service: eureka-server
            pom: servers/eureka-server/pom.xml
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # Install parent POM first for multi-module resolution
      - name: Install parent POM
        run: mvn -B -N install

      - name: Compile and verify
        run: mvn -B -f "${{ matrix.pom }}" -DskipTests verify

      - name: Dependency vulnerability check
        run: mvn -B -f "${{ matrix.pom }}" org.owasp:dependency-check-maven:check -Dformat=JSON -DfailBuildOnCVSS=7

  auth-smoke-tests:
    name: Auth Session Lifecycle Smoke Test
    runs-on: ubuntu-latest
    needs: java-security
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Install parent POM
        run: mvn -B -N install

      - name: Run auth smoke tests
        run: mvn -B -f users-service/pom.xml -Dtest=AuthControllerSmokeTest test

      - name: Verify prod refresh cookie policy
        run: grep -q "secure: true" users-service/src/main/resources/application-prod.yml

      - name: Verify all services have prod profiles
        run: |
          for svc in bar-service dropPoint-service eventPlanner-service users-service warehouse-service servers/gateway; do
            if [ ! -f "$svc/src/main/resources/application-prod.yml" ]; then
              echo "FAIL: $svc missing application-prod.yml"
              exit 1
            fi
          done
          echo "All services have production profiles ✅"
