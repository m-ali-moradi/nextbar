spring.application.name=droppoint-service
server.port=8083

# Actuator health check configuration
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always

logging.level.org.springframework.jdbc.datasource.init.ScriptUtils=debug
spring.h2.console.enabled=true
spring.datasource.url=jdbc:h2:mem:drop_points_db
#since we already have database populated with data and schema, we do not want hibernate to create that for us.
spring.jpa.hibernate.ddl-auto=none
spring.graphql.graphiql.enabled=true