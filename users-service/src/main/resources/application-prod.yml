# =============================================================================
# users-service — Production Profile Overrides
# =============================================================================

# ── Security ─────────────────────────────────────────────────────────────────
security:
  internal:
    enabled: true
  refresh-cookie:
    secure: true
    same-site: Strict

# ── Logging (reduce to INFO in production) ───────────────────────────────────
logging:
  level:
    root: INFO
    com.nextbar.usersservice: INFO
    org.springframework.security: WARN

# ── Actuator (restrict in production) ────────────────────────────────────────
management:
  endpoint:
    health:
      show-details: when-authorized
  tracing:
    sampling:
      probability: 0.1
