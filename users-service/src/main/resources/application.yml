spring:
  application:
    name: users-service
  datasource:
    url: jdbc:mysql://localhost:3306/user_db?createDatabaseIfNotExist=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  cloud:
    config:
      uri: http://localhost:8888
      fail-fast: false
      enabled: false

server:
  port: 8090

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
  instance:
    preferIpAddress: true

security:
  jwt:
    secret: yourSecretKeyForJWTTokenGenerationMustBeLongEnoughForHS256Algorithm
    expiration: 3600000
    issuer: users-service

