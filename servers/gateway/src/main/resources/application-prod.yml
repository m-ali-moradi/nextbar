# =============================================================================
# gateway — Production Profile Overrides
# =============================================================================

# ── Security ─────────────────────────────────────────────────────────────────
security:
  internal:
    enabled: true

# ── Logging (reduce to INFO in production) ───────────────────────────────────
logging:
  level:
    root: INFO

# ── Actuator (restrict in production) ────────────────────────────────────────
management:
  endpoint:
    health:
      show-details: when-authorized
  tracing:
    sampling:
      probability: 0.1
