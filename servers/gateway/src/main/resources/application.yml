server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    config:
      uri: http://localhost:8888
  
  # ============================================
  # RabbitMQ Configuration for WebSocket Events
  # ============================================
  # Gateway connects to RabbitMQ to receive events from
  # backend services and broadcast them via WebSocket
  rabbitmq:
    host: localhost
    port: 5672
    username: nextbar
    password: nextbar123
    listener:
      simple:
        retry:
          enabled: true
          max-attempts: 5
          initial-interval: 1000
          multiplier: 2.0
          max-interval: 10000
        default-requeue-rejected: false

security:
  jwt:
    secret: yourSecretKeyForJWTTokenGenerationMustBeLongEnoughForHS256Algorithm
    expiration: 3600000
    issuer: users-service

gateway:
  websocket:
    allow-anonymous: true

management:
  tracing:
    enabled: false

# ============================================
# Logging Configuration
# ============================================
logging:
  level:
    # WebSocket and RabbitMQ logging for debugging
    com.nextbar.gateway.websocket: DEBUG
    org.springframework.amqp: INFO
