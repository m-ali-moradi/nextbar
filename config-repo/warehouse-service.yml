spring:
  application:
    name: warehouse-service
  cloud:
    config:
      uri: http://localhost:8888
    function:
      definition: supplyRequestCreated;consumeDropPointCollectionEvent
    stream:
      bindings:
        supplyRequestCreated-in-0:
          destination: supply.request.created
          group: warehouse-service
          content-type: application/json
        consumeDropPointCollectionEvent-in-0:
          destination: drop-point.collection.events
          group: warehouse-service
          content-type: application/json
        supplyRequestUpdated-out-0:
          destination: supply.request.updated
          content-type: application/json
      rabbit:
        bindings:
          supplyRequestCreated-in-0:
            consumer:
              exchange-type: topic
              auto-bind-dlq: true
              republish-to-dlq: true
              requeue-rejected: false
          consumeDropPointCollectionEvent-in-0:
            consumer:
              exchange-type: topic
              auto-bind-dlq: true
              republish-to-dlq: true
              requeue-rejected: false
          supplyRequestUpdated-out-0:
            producer:
              exchange-type: topic
              exchange-durable: true

server:
  port: 8085

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
  instance:
    preferIpAddress: true
    hostname: localhost

# Circuit Breaker Configuration
resilience4j:
  circuitbreaker:
    instances:
      barService:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
      dropPointService:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true

# Logging
logging:
  level:
    root: INFO
    com.dmsa.warehouse: DEBUG
    io.github.resilience4j: DEBUG
    org.springframework.cloud.openfeign: DEBUG

security:
  internal:
    enabled: false
    secret: ${INTERNAL_SERVICE_SECRET:}