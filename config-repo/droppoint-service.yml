# =============================================================================
# droppoint-service — Centralised Configuration (Config Server)
# =============================================================================
#
# This file is served by Spring Cloud Config Server and contains ALL business
# configuration for droppoint-service. The local application.yml only bootstraps
# the Config Server connection; every other property lives here.
# =============================================================================

# ── Server ───────────────────────────────────────────────────────────────────
server:
  port: 8083
  shutdown: graceful

# ── Datasource & JPA ────────────────────────────────────────────────────────
spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s
  datasource:
    url: "jdbc:mysql://${DB_HOST:localhost}:3306/drop_points_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true"
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    database-platform: org.hibernate.dialect.MySQLDialect
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: always

# ── RabbitMQ Connection ──────────────────────────────────────────────────────
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_AMQP_PORT:5672}
    username: ${RABBITMQ_USERNAME:nextbar}
    password: ${RABBITMQ_PASSWORD:nextbar123}

# ── Spring Cloud Stream (Messaging) ─────────────────────────────────────────
  cloud:
    function:
      definition: consumeDropPointBootstrap;consumeDropPointCreatedEvent;consumeWarehouseCollectionStatusEvent;consumeEventCompletedEvent
    stream:
      bindings:
        # Input — drop-point bootstrap from event planner
        consumeDropPointBootstrap-in-0:
          destination: event.drop-point.bootstrap
          content-type: application/json
          group: droppoint-service
          consumer:
            max-attempts: 3
        # Input — drop-point created by event planner
        consumeDropPointCreatedEvent-in-0:
          destination: event.droppoint.created
          content-type: application/json
          group: droppoint-service
          consumer:
            max-attempts: 3
        # Input — warehouse collection status updates
        consumeWarehouseCollectionStatusEvent-in-0:
          destination: drop-point.collection.lifecycle
          content-type: application/json
          group: droppoint-service
          consumer:
            max-attempts: 3
        # Input — event completed
        consumeEventCompletedEvent-in-0:
          destination: event.completed
          content-type: application/json
          group: droppoint-service
          consumer:
            max-attempts: 3
        # Output — drop-point collection events
        dropPointCollectionEvent-out-0:
          destination: drop-point.collection.events
          content-type: application/json
      rabbit:
        bindings:
          consumeDropPointBootstrap-in-0:
            consumer:
                exchange-type: topic
                auto-bind-dlq: true
          consumeDropPointCreatedEvent-in-0:
            consumer:
                exchange-type: topic
                auto-bind-dlq: true
          consumeWarehouseCollectionStatusEvent-in-0:
            consumer:
              exchange-type: topic
              auto-bind-dlq: true
          consumeEventCompletedEvent-in-0:
            consumer:
              exchange-type: fanout
              auto-bind-dlq: true
          dropPointCollectionEvent-out-0:
            producer:
              exchange-type: topic
              exchange-durable: true

# ── Security ─────────────────────────────────────────────────────────────────
security:
  internal:
    enabled: false
    secret: ${INTERNAL_SERVICE_SECRET}

# ── Eureka ───────────────────────────────────────────────────────────────────
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    hostname: localhost

# ── Actuator & Observability ─────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_BASE_URL:http://localhost:9411}/api/v2/spans

# ── Logging ──────────────────────────────────────────────────────────────────
logging:
  level:
    root: INFO
    org.springframework.jdbc.datasource.init.ScriptUtils: DEBUG
