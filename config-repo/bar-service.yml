spring:
  application:
    name: bar-service
  cloud:
    config:
      uri: http://localhost:8888
    function:
      definition: supplyRequestUpdated;consumeBarCreatedEvent
    stream:
      bindings:
        supplyRequestUpdated-in-0:
          destination: supply.request.updated
          group: bar-service
          content-type: application/json
        consumeBarCreatedEvent-in-0:
          destination: event.bar.created
          group: bar-service
          content-type: application/json
      rabbit:
        bindings:
          supplyRequestUpdated-in-0:
            consumer:
              exchange-type: topic
              auto-bind-dlq: true
              republish-to-dlq: true
              requeue-rejected: false
          consumeBarCreatedEvent-in-0:
            consumer:
              exchange-type: fanout
              auto-bind-dlq: true

server:
  port: 8081

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
  instance:
    preferIpAddress: true
    hostname: localhost

management:
  endpoints:
    web:
      exposure:
        include: '*'
  health:
    circuitbreakers:
      enabled: true
  metrics:
    enable:
      resilience4j.circuitbreaker.calls: true

resilience4j:
  circuitbreaker:
    instances:
      eventplanner-service:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s

logging:
  level:
    root: INFO
    io.github.resilience4j: DEBUG
    org.springframework.cloud.openfeign: DEBUG

security:
  internal:
    enabled: false
    secret: ${INTERNAL_SERVICE_SECRET:}


