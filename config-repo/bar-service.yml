# =============================================================================
# bar-service — Centralised Configuration (Config Server)
# =============================================================================
#
# This file is served by Spring Cloud Config Server and contains ALL business
# configuration for bar-service. The local application.yml only bootstraps the
# Config Server connection; every other property lives here.
# =============================================================================

# ── Server ───────────────────────────────────────────────────────────────────
server:
  port: 8081
  shutdown: graceful

# ── Datasource & JPA ────────────────────────────────────────────────────────
spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:3306/bar_db?createDatabaseIfNotExist=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

# ── RabbitMQ Connection ──────────────────────────────────────────────────────
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_AMQP_PORT:5672}
    username: ${RABBITMQ_USERNAME:nextbar}
    password: ${RABBITMQ_PASSWORD:nextbar123}

# ── Spring Cloud Stream (Messaging) ─────────────────────────────────────────
  cloud:
    function:
      definition: supplyRequestUpdated;consumeBarCreatedEvent;consumeBarBootstrapEvent;consumeEventCompletedEvent
    stream:
      bindings:
        # Output — supply request created
        supplyRequestCreated-out-0:
          destination: supply.request.created
          content-type: application/json
        # Input — supply request updated
        supplyRequestUpdated-in-0:
          destination: supply.request.updated
          content-type: application/json
          group: bar-service
          consumer:
            max-attempts: 5
            back-off-initial-interval: 1000
            back-off-multiplier: 2.0
            back-off-max-interval: 10000
        # Input — bar created by event planner
        consumeBarCreatedEvent-in-0:
          destination: event.bar.created
          content-type: application/json
          group: bar-service
          consumer:
            max-attempts: 3
        # Input — bar bootstrap
        consumeBarBootstrapEvent-in-0:
          destination: event.bar.bootstrap
          content-type: application/json
          group: bar-service
          consumer:
            max-attempts: 3
        # Input — event completed
        consumeEventCompletedEvent-in-0:
          destination: event.completed
          content-type: application/json
          group: bar-service
          consumer:
            max-attempts: 3
      rabbit:
        bindings:
          supplyRequestCreated-out-0:
            producer:
              exchange-type: topic
              exchange-durable: true
              delivery-mode: PERSISTENT
          supplyRequestUpdated-in-0:
            consumer:
              exchange-type: topic
              auto-bind-dlq: true
              republish-to-dlq: true
              requeue-rejected: false
          consumeBarCreatedEvent-in-0:
            consumer:
                exchange-type: topic
                auto-bind-dlq: true
          consumeBarBootstrapEvent-in-0:
            consumer:
                exchange-type: topic
                auto-bind-dlq: true
          consumeEventCompletedEvent-in-0:
            consumer:
              exchange-type: fanout
              auto-bind-dlq: true

# ── JWT & Internal Security ──────────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET}

security:
  internal:
    enabled: false
    secret: ${INTERNAL_SERVICE_SECRET}


# ── Eureka ───────────────────────────────────────────────────────────────────
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    hostname: localhost

# ── Actuator & Observability ─────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_BASE_URL:http://localhost:9411}/api/v2/spans

# ── Logging ──────────────────────────────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.nextbar.bar: DEBUG
    org.springframework.security: DEBUG

# ── Swagger / SpringDoc ─────────────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html