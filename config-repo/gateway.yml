server:
  port: 8080
  shutdown: graceful
spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s
  application:
    name: gateway
  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials
      routes:

      # Event-Planner: All event-related routes (events, bars, drop-points)
        - id: eventplanner-service
          uri: lb://eventplanner-service
          predicates:
            - Path=/api/v1/events, /api/v1/events/**
          filters:
            - JwtAuthentication

      # Bar route (for standalone bar operations)
        - id: bar-service
          uri: lb://bar-service
          predicates:
            - Path=/api/v1/bars/**
          filters:
            - JwtAuthentication
            
      # Droppoints route (for standalone droppoint operations)
        - id: droppoint-service
          uri: lb://droppoint-service
          predicates:
            - Path=/api/v1/droppoints, /api/v1/droppoints/**
          filters:
            - JwtAuthentication


      # Warehouse route
        - id: warehouse-service
          uri: lb://warehouse-service
          predicates:
            - Path=/api/v1/warehouse, /api/v1/warehouse/**
          filters:
            - JwtAuthentication

      # Users route (authenticated user/admin endpoints)
        - id: users-service
          uri: lb://users-service
          predicates:
            - Path=/api/v1/users, /api/v1/users/**
          filters:
            - JwtAuthentication

security:
  jwt:
    secret: ${JWT_SECRET}
    expiration: 3600000
  rate-limit:
    login:
      max-requests: ${LOGIN_RATE_LIMIT_MAX_REQUESTS:10}
      window-seconds: ${LOGIN_RATE_LIMIT_WINDOW_SECONDS:60}
      block-seconds: ${LOGIN_RATE_LIMIT_BLOCK_SECONDS:300}
  internal:
    # Dev/CI default: disabled unless explicitly turned on
    enabled: false
    secret: ${INTERNAL_SERVICE_SECRET}
  headers:
    content-security-policy: ${SECURITY_CSP:default-src 'self'; frame-ancestors 'none'; object-src 'none'; base-uri 'self'}
    referrer-policy: ${SECURITY_REFERRER_POLICY:no-referrer}
    permissions-policy: ${SECURITY_PERMISSIONS_POLICY:geolocation=(), microphone=(), camera=()}
    hsts:
      max-age: ${SECURITY_HSTS_MAX_AGE:31536000}
      include-subdomains: ${SECURITY_HSTS_INCLUDE_SUBDOMAINS:true}
      preload: ${SECURITY_HSTS_PRELOAD:false}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}

