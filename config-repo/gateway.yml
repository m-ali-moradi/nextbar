server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      routes:
        - id: bar-service
          uri: lb://bar-service
          predicates:
            - Path=/api/bar/**

        - id: droppoint-service
          uri: lb://droppoint-service
          predicates:
            - Path=/api/droppoints/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
