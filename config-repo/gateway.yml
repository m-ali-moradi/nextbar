server:
  port: 8080
spring:
  application:
    name: gateway
  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"
              - "http://localhost:5174"
              - "http://localhost:5175"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      routes:

      # Event-Planner route
        - id: eventplanner-service
          uri: lb://eventplanner-service
          predicates:
            - Path=/api/events/**
          filters:
            - StripPrefix=0

      # Bar route
        - id: bar-service
          uri: lb://bar-service
          predicates:
            - Path=/api/bars/**
          filters:
            - StripPrefix=1
            - JwtAuthentication
      # Droppoints route
        - id: droppoint-service
          uri: lb://droppoint-service
          predicates:
            - Path=/api/droppoints/**
          filters:
            - StripPrefix=1


      # Warehouse route
        - id: warehouse-service
          uri: lb://warehouse-service
          predicates:
            - Path=/api/warehouse/**
          filters:
            - StripPrefix=1
            

      # Auth route (login, register)
        - id: auth-service
          uri: lb://users-service
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1

      # Users route
        - id: users-service
          uri: lb://users-service
          predicates:
            - Path=/api/users/**
          filters:
            - StripPrefix=1

