server:
  port: 8080
spring:
  application:
    name: gateway
  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials
      globalcors:
        add-to-simple-url-handler-mapping: true
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"
              - "http://localhost:5174"
              - "http://localhost:5175"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      routes:

      # Event-Planner: All event-related routes (events, bars, drop-points)
        - id: eventplanner-service
          uri: lb://eventplanner-service
          predicates:
            - Path=/api/events, /api/events/**
          filters:
            - StripPrefix=0
            - JwtAuthentication

      # Bar route (for standalone bar operations)
        - id: bar-service
          uri: lb://bar-service
          predicates:
            - Path=/api/bars/**
          filters:
            - StripPrefix=1
            - JwtAuthentication
            
      # Droppoints route (for standalone droppoint operations)
        - id: droppoint-service
          uri: lb://droppoint-service
          predicates:
            - Path=/api/droppoints/**
          filters:
            - StripPrefix=1
            - JwtAuthentication


      # Warehouse route
        - id: warehouse-service
          uri: lb://warehouse-service
          predicates:
            - Path=/api/warehouse/**
          filters:
            - StripPrefix=1
            - JwtAuthentication

      # Users route
        - id: users-service
          uri: lb://users-service
          predicates:
            - Path=/api/users/**
          filters:
            - StripPrefix=1
            - JwtAuthentication

security:
  jwt:
    secret: ${JWT_SECRET}
    expiration: 3600000
  internal:
    # Dev/CI default: disabled unless explicitly turned on
    enabled: false
    secret: ${INTERNAL_SERVICE_SECRET:}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

