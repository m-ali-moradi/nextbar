spring:
  application:
    name: users-service
  cloud:
    config:
      uri: http://localhost:8888
server:
  port: 8090

security:
  jwt:
    secret: ${JWT_SECRET:change-me-dev-jwt-secret-key-256-bit-minimum}
    expiration: 3600000
    refresh-expiration: 1209600000

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
