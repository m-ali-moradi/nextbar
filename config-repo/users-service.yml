spring:
  application:
    name: users-service
  cloud:
    config:
      uri: http://localhost:8888
server:
  port: 8090

security:
  jwt:
    secret: ${JWT_SECRET}
    expiration: 3600000
    refresh-expiration: 1209600000
  mfa:
    # Dev/CI default: MFA disabled unless explicitly enabled
    enabled: false
    issuer: nextbar-users

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
