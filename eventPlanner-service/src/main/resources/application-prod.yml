# =============================================================================
# eventplanner-service — Production Profile Overrides
# =============================================================================

# ── Security ─────────────────────────────────────────────────────────────────
security:
  internal:
    enabled: true

# ── Logging (reduce to INFO in production) ───────────────────────────────────
logging:
  level:
    root: INFO
    de.fhdo.eventPlanner: INFO
    io.github.resilience4j: INFO
    org.springframework.cloud.openfeign: INFO
    org.springframework.security: WARN

# ── Actuator (restrict in production) ────────────────────────────────────────
management:
  endpoint:
    health:
      show-details: when-authorized
  tracing:
    sampling:
      probability: 0.1
